<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Oh, Kay</title>
    <meta name="theme-color" content="#e6e6ce" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link type="text/css" rel="stylesheet" href="../css/style.css" />
    <link
      type="text/css"
      rel="stylesheet"
      href="../css/fontawesome/css/all.css"
    />
    <link rel="icon" href="../img/favicon.png" type="image/svg+xml" />
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  </head>

  <body>
    <div class="share">
      <img class="share__headshot" src="../img/headshot-2025-10.jpg" />
      <h1 class="share__name">Kay Plunkett</h1>
      <canvas id="qr-code"></canvas>
      <p class="share__url">ohkaycomputer.com</p>
    </div>

    <script>
      new QRious({
        element: document.getElementById("qr-code"),
        value: "https://ohkaycomputer.com",
        size: 200,
        foreground: "#444444",
        background: "#fcfaf4",
      });
    </script>
  </body>
</html>
